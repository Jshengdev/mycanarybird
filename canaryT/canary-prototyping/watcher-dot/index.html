<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Watcher — Canary</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    />
    <style>
      /* ----------------------------------------------------------
         Canary design tokens
         ---------------------------------------------------------- */
      :root {
        --black:        #0A0A0A;
        --text-black:   #0A0A0A;
        --icon-grey:    #5A5A7A;
        --grey-stroke:  #DCDCE8;
        --bg:           #F5F5F8;
        --card-bg:      #FAFAFA;
        --safe:         #2D7A55;
        --accent-color: #0B0DC4;
        --font-mono:    'IBM Plex Mono', 'Menlo', monospace;
        --pulse-duration: 2s;
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        min-height: 500vh;  /* 5x viewport height of scrollable space */
      }

      /* ----------------------------------------------------------
         Subtle scroll markers — one per phase — so you can see
         where the Watcher lands as you scroll
         ---------------------------------------------------------- */
      .marker {
        position: absolute;
        left: 40px;
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--icon-grey);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .marker::before {
        content: '';
        width: 24px;
        height: 1px;
        background: var(--grey-stroke);
      }
      .marker:nth-of-type(1) { top: 120px; }
      .marker:nth-of-type(2) { top: calc(100vh * 1); }
      .marker:nth-of-type(3) { top: calc(100vh * 2); }
      .marker:nth-of-type(4) { top: calc(100vh * 3); }
      .marker:nth-of-type(5) { top: calc(100vh * 4); }

      /* ----------------------------------------------------------
         Readout
         ---------------------------------------------------------- */
      .readout {
        position: fixed;
        bottom: 24px;
        left: 24px;
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        color: var(--icon-grey);
        letter-spacing: 0.15em;
        background: var(--card-bg);
        padding: 8px 12px;
        border: 1px solid var(--grey-stroke);
        z-index: 10;
        text-transform: uppercase;
      }

      /* ----------------------------------------------------------
         The Watcher — larger now so it's clearly visible
         ---------------------------------------------------------- */
      :root {
        --watcher-size:      20px;
        --watcher-right:     48px;
        --watcher-top-start: 120px;
      }

      /* Trail rail — fixed, always present */
      .watcher-rail {
        position: fixed;
        top: 0;
        bottom: 0;
        right: calc(var(--watcher-right) + var(--watcher-size) / 2 - 0.5px);
        width: 1px;
        z-index: 5;
        pointer-events: none;
      }

      .watcher-trail {
        position: absolute;
        top: var(--watcher-top-start);
        width: 1px;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          var(--grey-stroke) 14%,
          var(--grey-stroke) 100%
        );
        height: 0;
      }

      .watcher {
        position: fixed;
        right: var(--watcher-right);
        top: var(--watcher-top-start);
        width: var(--watcher-size);
        height: var(--watcher-size);
        z-index: 6;
        pointer-events: none;
        transform: translate3d(var(--drift, 0), 0, 0);
        will-change: transform;
      }

      .watcher-sphere {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          radial-gradient(
            circle at 32% 28%,
            #6EB48F 0%,
            var(--safe) 48%,
            #173D29 100%
          );
        box-shadow:
          inset -2px -3px 3px rgba(0, 0, 0, 0.3),
          inset 2px 2px 3px rgba(255, 255, 255, 0.45),
          0 3px 6px rgba(45, 122, 85, 0.3);
        animation: watcher-pulse var(--pulse-duration) ease-in-out infinite;
      }

      .watcher-pupil {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 4px;
        background: var(--black);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.6;
      }

      .watcher-ring {
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1px solid var(--accent-color);
        opacity: 0;
        transform: scale(1);
      }

      @keyframes watcher-pulse {
        0%, 100% { transform: scale(1);    opacity: 0.95; }
        50%      { transform: scale(1.1);  opacity: 1; }
      }

      .watcher.observing .watcher-sphere {
        animation: watcher-observe 460ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
      }
      .watcher.observing .watcher-ring {
        animation: watcher-ring 600ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
      }

      @keyframes watcher-observe {
        0%   { transform: scale(1);   background: radial-gradient(circle at 32% 28%, #6EB48F 0%, var(--safe) 48%, #173D29 100%); }
        40%  { transform: scale(1.9); background: radial-gradient(circle at 32% 28%, #5E62F5 0%, var(--accent-color) 48%, #060899 100%); }
        100% { transform: scale(1);   background: radial-gradient(circle at 32% 28%, #6EB48F 0%, var(--safe) 48%, #173D29 100%); }
      }
      @keyframes watcher-ring {
        0%   { opacity: 0;   transform: scale(1); }
        20%  { opacity: 0.9; transform: scale(1.3); }
        100% { opacity: 0;   transform: scale(3.5); }
      }

      /* Reduced motion: the Watcher still tracks scroll position but holds still */
      @media (prefers-reduced-motion: reduce) {
        .watcher-sphere { animation: none !important; }
        .watcher.observing .watcher-sphere,
        .watcher.observing .watcher-ring { animation: none !important; }
        html { scroll-behavior: auto; }
      }
    </style>
  </head>
  <body>
    <span class="marker" data-phase="hero">phase 1 · hero</span>
    <span class="marker" data-phase="observe">phase 2 · observe</span>
    <span class="marker" data-phase="control">phase 3 · control</span>
    <span class="marker" data-phase="improve">phase 4 · improve</span>
    <span class="marker" data-phase="closer">phase 5 · closer</span>

    <div class="readout" aria-hidden="true">
      <span id="readout">scroll · 0%</span>
    </div>

    <div class="watcher-rail" aria-hidden="true">
      <div class="watcher-trail" id="watcher-trail"></div>
    </div>
    <div class="watcher" id="watcher" aria-hidden="true">
      <div class="watcher-ring"></div>
      <div class="watcher-sphere"></div>
      <div class="watcher-pupil"></div>
    </div>

    <script>
      const watcher = document.getElementById('watcher');
      const trail = document.getElementById('watcher-trail');
      const readout = document.getElementById('readout');

      const topStart = 120;
      const bottomInset = 120;
      let scheduled = false;

      function handleScroll() {
        const scrollable = Math.max(
          1,
          document.documentElement.scrollHeight - window.innerHeight
        );
        const progress = Math.min(1, Math.max(0, window.scrollY / scrollable));
        const topEnd = window.innerHeight - bottomInset;
        const y = topStart + (topEnd - topStart) * progress;

        trail.style.height = `${Math.max(0, y - topStart)}px`;
        watcher.style.top = `${y}px`;

        readout.textContent = `scroll · ${(progress * 100).toFixed(0)}%`;
      }

      window.addEventListener('scroll', () => {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(() => { handleScroll(); scheduled = false; });
      }, { passive: true });
      handleScroll();

      const prefersReduced = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function driftLoop() {
        const t = performance.now() * 0.0009;
        const driftPx = Math.sin(t) * 9 + Math.sin(t * 0.41) * 4;
        watcher.style.setProperty('--drift', `${driftPx}px`);
        if (!prefersReduced) requestAnimationFrame(driftLoop);
      }
      if (!prefersReduced) driftLoop();

      /* Flash at each marker as it passes the Watcher's vertical position */
      const markers = document.querySelectorAll('.marker');
      const seen = new Set();

      function checkMarkers() {
        if (prefersReduced) return;
        const watcherRect = watcher.getBoundingClientRect();
        const watcherY = watcherRect.top + watcherRect.height / 2;

        for (const m of markers) {
          const rect = m.getBoundingClientRect();
          const midY = rect.top + rect.height / 2;
          const phase = m.getAttribute('data-phase');
          // Fire when marker is within 40px of watcher center
          if (Math.abs(midY - watcherY) < 30 && !seen.has(phase)) {
            seen.add(phase);
            flash();
          }
          // Reset seen when scrolled far away so it fires again on scroll back
          if (Math.abs(midY - watcherY) > 200) {
            seen.delete(phase);
          }
        }
        requestAnimationFrame(checkMarkers);
      }
      requestAnimationFrame(checkMarkers);

      function flash() {
        watcher.classList.remove('observing');
        void watcher.offsetWidth;
        watcher.classList.add('observing');
      }
    </script>
  </body>
</html>
